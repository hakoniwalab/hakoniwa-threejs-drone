<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Hakoniwa Three.js Drone Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   sans-serif;
    }

    #main-container {
      display: flex;
      height: 100%;
      width: 100%;
    }

    #panel {
      width: 260px;
      background-color: #f0f0f0;
      padding: 10px;
      box-sizing: border-box;
      border-right: 1px solid #ccc;
      overflow-y: auto;
    }

    #panel h3 {
      margin: 12px 0 6px;
      font-size: 14px;
    }

    #panel button {
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    #viewer-container {
      flex: 1;
      background: #000;
    }

    #three-root {
      width: 100%;
      height: 100%;
    }

    .prop-box {
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
      padding: 6px 8px;
      margin-top: 10px;
    }
    .prop-box h4 {
      margin: 0 0 6px 0;
      font-size: 13px;
      font-weight: bold;
    }
    .prop-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .prop-table td {
      padding: 2px 4px;
    }
    .prop-table .label {
      width: 40px;
    }
    .prop-table .value {
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="main-container">
    <!-- 左パネル -->
    <div id="panel">
      <button id="connect-btn">connect</button>

      <div style="margin-top: 8px;">
        <label for="ws-uri-input"><strong>WebSocket URI</strong></label><br>
        <input
          id="ws-uri-input"
          type="text"
          style="width: 100%;"
          value="ws://127.0.0.1:8765"
        >
      </div>

      <div style="margin-top: 8px;">
        <label for="drone-select"><strong>Drone</strong></label><br>
        <select id="drone-select" style="width: 100%;"></select>
      </div>

      <div style="margin-top: 4px;">
        <label>
          <input type="checkbox" id="follow-checkbox" checked>
          Follow selected
        </label>
      </div>

      <div class="prop-box">
        <h4>Drone State (debug)</h4>
        <table class="prop-table">
          <tr><td class="label">x:</td><td class="value" id="prop-x"></td></tr>
          <tr><td class="label">y:</td><td class="value" id="prop-y"></td></tr>
          <tr><td class="label">z:</td><td class="value" id="prop-z"></td></tr>
        </table>
      </div>
    </div>

    <!-- 右：Three.js -->
    <div id="viewer-container">
      <div id="three-root"></div>
    </div>
  </div>

  <!-- ES module shims & importmap -->
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- UI配線専用モジュール -->
  <script type="module">
    import { createDroneViewer } from "./src/public/drone_viewer.js";
    import { loadViewerConfig } from "./src/viewer_config_loader.js";

    const viewer = createDroneViewer();

    function getDronesFromViewer() {
      return viewer.getDrones();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const connectBtn = document.getElementById('connect-btn');
      const droneSelect = document.getElementById("drone-select");
      const followCheckbox = document.getElementById("follow-checkbox");
      const wsUriInput = document.getElementById('ws-uri-input');
      const stateX = document.getElementById('prop-x');
      const stateY = document.getElementById('prop-y');
      const stateZ = document.getElementById('prop-z');

      function populateDroneSelect() {
        const drones = getDronesFromViewer();

        // 一旦クリア
        droneSelect.innerHTML = "";

        drones.forEach((drone, index) => {
          const opt = document.createElement("option");

          // Drone に name があれば使う
          // なければ ID (droneId) を使う
          opt.value = drone.droneId ?? index;
          opt.textContent = drone.name ?? `${drone.droneId}`;

          droneSelect.appendChild(opt);
        });
        if (droneSelect.options.length > 0 && droneSelect.selectedIndex < 0) {
          droneSelect.selectedIndex = 0;
        }
      }
      function applyFollowSelectedIfEnabled() {
        if (!followCheckbox?.checked) {
          return;
        }
        const selectedId = droneSelect?.value;
        if (!selectedId) return;
        viewer.focusDroneById(selectedId);
      }
      // --- 選択中ドローンを取得 ---
      function getSelectedDrone() {
        const drones = getDronesFromViewer();
        if (!drones.length) return null;

        const selId = droneSelect.value;
        if (!selId) return drones[0];

        const found = drones.find(d => String(d.droneId) === selId);
        return found || drones[0];
      }
      // --- 状態パネルを定期更新 ---
      function updateDroneStatePanel() {
        const d = getSelectedDrone();
        if (!d || !d.latestPose || !d.latestPose.rosPos) {
          // データがまだ来てないときは空にしておく
          stateX.textContent = "";
          stateY.textContent = "";
          stateZ.textContent = "";
          return;
        }

        const [x, y, z] = d.latestPose.rosPos;
        stateX.textContent = x.toFixed(2);
        stateY.textContent = y.toFixed(2);
        stateZ.textContent = z.toFixed(2);
      }

      if (!connectBtn) {
        console.warn("connect-btn not found");
        return;
      }
      let loadedViewerConfig = null;
      let statePanelIntervalMsec = 100;
      loadViewerConfig()
        .then(async ({ configUrl, config }) => {
          loadedViewerConfig = config;
          statePanelIntervalMsec = config.ui?.statePanelIntervalMsec ?? 100;
          viewer.configure(config);
          if (wsUriInput) {
            wsUriInput.value = config.pdu.wsUri;
          }
          await viewer.initialize();
          populateDroneSelect();
          console.log("[DroneViewer] loaded viewer config:", configUrl, config);
        })
        .catch((e) => {
          console.error(e);
        });

      connectBtn.addEventListener('click', async () => {
        connectBtn.disabled = true;
        connectBtn.textContent = "connecting...";

        try {
          const defaultWsUri = loadedViewerConfig?.pdu?.wsUri ?? "ws://127.0.0.1:8765";
          const wsUri = (wsUriInput?.value || "").trim() || defaultWsUri;
          const ok = await viewer.connectPdu({
            wsUri: wsUri,
          });
          if (ok) {
            await viewer.initDronePdu();

            populateDroneSelect();
            applyFollowSelectedIfEnabled();
            // 100msごとに状態更新
            setInterval(updateDroneStatePanel, statePanelIntervalMsec);

            connectBtn.textContent = "connected";
          } else {
            connectBtn.textContent = "connect failed";
            connectBtn.disabled = false;
          }
        } catch (e) {
          console.error(e);
          connectBtn.textContent = "error";
          connectBtn.disabled = false;
        }

      });

      if (droneSelect) {
        droneSelect.addEventListener("change", () => {
          applyFollowSelectedIfEnabled();
        });
      }
      if (followCheckbox) {
        followCheckbox.addEventListener("change", () => {
          const enabled = !!followCheckbox.checked;
          viewer.setFollowSelectedEnabled(enabled);
          if (enabled) {
            applyFollowSelectedIfEnabled();
          }
        });
      }
    });
  </script>
</body>
</html>
